services:
  - type: web
    name: rissala
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn rissala_core.wsgi"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: DJANGO_SETTINGS_MODULE
        value: rissala_core.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: rissala-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*" # You should restrict this to your actual domain later

databases:
  - name: rissala-db
    plan: free
